<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Приглашение на встречу · Мисс Индира</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   RESET & TOKENS
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Palette */
  --c-bg:       #fafaf9;
  --c-surface:  #ffffff;
  --c-ink:      #0f0f0e;
  --c-muted:    #78716c;
  --c-subtle:   #a8a29e;
  --c-border:   #e7e5e4;
  --c-border-2: #d6d3d1;
  --c-hover:    #f5f5f4;

  /* Type scale */
  --t-xs:  0.6875rem;
  --t-sm:  0.8125rem;
  --t-base:1rem;
  --t-lg:  1.125rem;
  --t-xl:  1.375rem;
  --t-2xl: 1.75rem;
  --t-3xl: 2.25rem;
  --t-4xl: 3rem;

  /* Spacing */
  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
  --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;
  --sp-12: 48px; --sp-16: 64px;

  /* Radii */
  --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 24px; --r-full: 9999px;

  /* Motion */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in:  cubic-bezier(0.4, 0, 1, 1);
  --dur-fast: 180ms;
  --dur-base: 320ms;
  --dur-slow: 600ms;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--c-bg);
  color: var(--c-ink);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ═══════════════════════════════════════════
   NOISE TEXTURE OVERLAY
═══════════════════════════════════════════ */
body::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 9999;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

/* ═══════════════════════════════════════════
   SCREEN SYSTEM
═══════════════════════════════════════════ */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: var(--sp-6);
  will-change: opacity, transform;
  transition:
    opacity var(--dur-slow) var(--ease-out),
    transform var(--dur-slow) var(--ease-out);
  z-index: 1;
}
.screen[hidden] {
  opacity: 0;
  pointer-events: none;
  transform: translateY(20px) scale(0.98);
}
.screen.active {
  opacity: 1;
  pointer-events: all;
  transform: none;
}
#screen-2 {
  overflow-y: auto;
  justify-content: flex-start;
  padding: var(--sp-8) var(--sp-6) var(--sp-16);
  -webkit-overflow-scrolling: touch;
}

/* ═══════════════════════════════════════════
   CANVAS LAYERS
═══════════════════════════════════════════ */
#canvas-confetti,
#canvas-particles {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 500;
  opacity: 0;
  transition: opacity var(--dur-base) var(--ease-out);
}

/* ═══════════════════════════════════════════
   CARD COMPONENT
═══════════════════════════════════════════ */
.card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-xl);
  box-shadow:
    0 0 0 1px rgba(0,0,0,.02),
    0 1px 2px rgba(0,0,0,.04),
    0 4px 16px rgba(0,0,0,.06),
    0 16px 48px rgba(0,0,0,.06);
}

/* ═══════════════════════════════════════════
   SCREEN 1 — INVITATION
═══════════════════════════════════════════ */
.s1-card {
  width: 100%; max-width: 440px;
  padding: var(--sp-12) var(--sp-10);
  text-align: center;
  position: relative; z-index: 2;
}

/* Animated entrance lines */
.s1-line {
  opacity: 0;
  transform: translateY(16px);
  transition:
    opacity var(--dur-slow) var(--ease-out),
    transform var(--dur-slow) var(--ease-out);
}
.s1-line.visible { opacity: 1; transform: none; }

.s1-label {
  font-size: var(--t-xs);
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--c-subtle);
}

.s1-name {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: clamp(var(--t-3xl), 8vw, var(--t-4xl));
  font-weight: 400;
  line-height: 1.1;
  color: var(--c-ink);
  margin-top: var(--sp-4);
}

.s1-rule {
  width: 32px; height: 1px;
  background: var(--c-border-2);
  margin: var(--sp-8) auto;
}

.s1-question {
  font-family: 'Instrument Serif', Georgia, serif;
  font-style: italic;
  font-size: clamp(var(--t-lg), 4vw, var(--t-xl));
  color: var(--c-muted);
  line-height: 1.5;
}

.s1-actions {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-3);
  margin-top: var(--sp-10);
  flex-wrap: wrap;
}

/* Fate message */
.s1-fate {
  font-family: 'Instrument Serif', Georgia, serif;
  font-style: italic;
  font-size: var(--t-base);
  color: var(--c-subtle);
  margin-top: var(--sp-8);
  opacity: 0;
  transform: translateY(8px);
  transition: opacity var(--dur-slow) var(--ease-out), transform var(--dur-slow) var(--ease-out);
  min-height: 1.5em;
}
.s1-fate.visible { opacity: 1; transform: none; }

/* ═══════════════════════════════════════════
   BUTTON SYSTEM
═══════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-2);
  border: none;
  border-radius: var(--r-md);
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: var(--t-sm);
  letter-spacing: -0.01em;
  padding: 11px 22px;
  cursor: pointer;
  outline: none;
  white-space: nowrap;
  transition:
    background var(--dur-fast) var(--ease-out),
    color var(--dur-fast) var(--ease-out),
    transform var(--dur-fast) var(--ease-out),
    box-shadow var(--dur-fast) var(--ease-out),
    opacity var(--dur-fast) var(--ease-out);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.btn:focus-visible {
  outline: 2px solid var(--c-ink);
  outline-offset: 2px;
}

.btn-primary {
  background: var(--c-ink);
  color: #fff;
  box-shadow: 0 1px 2px rgba(0,0,0,.2), 0 2px 8px rgba(0,0,0,.12);
}
.btn-primary:hover {
  background: #1c1c1a;
  box-shadow: 0 2px 4px rgba(0,0,0,.2), 0 4px 16px rgba(0,0,0,.16);
  transform: translateY(-1px);
}
.btn-primary:active { transform: scale(0.97); }

.btn-ghost {
  background: transparent;
  color: var(--c-muted);
  border: 1px solid var(--c-border);
}
.btn-ghost:hover {
  background: var(--c-hover);
  color: var(--c-ink);
  border-color: var(--c-border-2);
}

/* No button — fixed position when escaping */
.btn-no {
  position: relative;
  transition:
    background var(--dur-fast),
    color var(--dur-fast),
    border-color var(--dur-fast),
    opacity var(--dur-base) var(--ease-out);
}
.btn-no.is-fixed {
  position: fixed;
  z-index: 600;
  transition:
    background var(--dur-fast),
    color var(--dur-fast),
    border-color var(--dur-fast),
    left var(--dur-base) var(--ease-out),
    top var(--dur-base) var(--ease-out),
    transform var(--dur-base) var(--ease-out);
}

/* ═══════════════════════════════════════════
   SCREEN 2 — DATE PICKER
═══════════════════════════════════════════ */
.s2-inner {
  width: 100%; max-width: 520px;
  display: flex; flex-direction: column;
  gap: var(--sp-6);
  padding: var(--sp-2) 0;
  position: relative; z-index: 2;
}

.s2-header { text-align: center; }

.s2-title {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: clamp(var(--t-2xl), 5vw, var(--t-3xl));
  font-weight: 400;
  line-height: 1.2;
  color: var(--c-ink);
}

.s2-sub {
  font-size: var(--t-sm);
  color: var(--c-subtle);
  margin-top: var(--sp-2);
  font-weight: 400;
}

/* Section label */
.section-label {
  font-size: var(--t-xs);
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--c-subtle);
}

/* Format grid */
.format-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--sp-2);
}
@media (max-width: 400px) {
  .format-grid { grid-template-columns: repeat(2, 1fr); }
}

.format-card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  padding: var(--sp-5) var(--sp-3);
  text-align: center;
  cursor: pointer;
  transition:
    border-color var(--dur-fast) var(--ease-out),
    background var(--dur-fast) var(--ease-out),
    box-shadow var(--dur-fast) var(--ease-out),
    transform var(--dur-fast) var(--ease-out);
  -webkit-tap-highlight-color: transparent;
}
.format-card:hover {
  border-color: var(--c-border-2);
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
  transform: translateY(-1px);
}
.format-card.selected {
  background: var(--c-ink);
  border-color: var(--c-ink);
  box-shadow: 0 2px 12px rgba(0,0,0,.2);
  transform: translateY(-1px);
}
.format-card .fc-icon {
  font-size: 1.5rem;
  display: block;
  margin-bottom: var(--sp-2);
  line-height: 1;
}
.format-card .fc-label {
  font-size: var(--t-xs);
  font-weight: 500;
  color: var(--c-muted);
  transition: color var(--dur-fast);
}
.format-card.selected .fc-label { color: rgba(255,255,255,0.85); }

/* Custom input */
.custom-wrap {
  display: none;
  animation: slideDown var(--dur-base) var(--ease-out) both;
}
.custom-wrap.visible { display: block; }
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: none; }
}

.custom-input {
  width: 100%;
  padding: 12px var(--sp-4);
  border: 1px solid var(--c-border-2);
  border-radius: var(--r-md);
  font-family: 'Inter', sans-serif;
  font-size: var(--t-base);
  color: var(--c-ink);
  background: var(--c-surface);
  outline: none;
  transition: border-color var(--dur-fast), box-shadow var(--dur-fast);
}
.custom-input::placeholder { color: var(--c-subtle); }
.custom-input:focus {
  border-color: var(--c-ink);
  box-shadow: 0 0 0 3px rgba(0,0,0,.06);
}

/* Calendar */
.cal-card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  padding: var(--sp-5);
}

.cal-nav-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--sp-5);
}

.cal-month-label {
  font-size: var(--t-sm);
  font-weight: 600;
  color: var(--c-ink);
  letter-spacing: -0.01em;
}

.cal-btn {
  width: 32px; height: 32px;
  border-radius: var(--r-sm);
  border: 1px solid var(--c-border);
  background: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--c-muted);
  font-size: var(--t-base);
  line-height: 1;
  transition: background var(--dur-fast), color var(--dur-fast), border-color var(--dur-fast);
}
.cal-btn:hover { background: var(--c-hover); border-color: var(--c-border-2); color: var(--c-ink); }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}

.cal-dh {
  font-size: 0.625rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--c-subtle);
  text-align: center;
  padding: var(--sp-1) 0 var(--sp-3);
}

.cal-day {
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  font-size: var(--t-sm);
  font-weight: 400;
  border-radius: var(--r-sm);
  cursor: pointer;
  border: none;
  background: none;
  color: var(--c-ink);
  transition: background var(--dur-fast), color var(--dur-fast);
  -webkit-tap-highlight-color: transparent;
}
.cal-day:hover:not(.past):not(.empty) { background: var(--c-hover); }
.cal-day.past   { color: var(--c-border-2); cursor: not-allowed; }
.cal-day.empty  { pointer-events: none; }
.cal-day.today  { font-weight: 600; }
.cal-day.selected {
  background: var(--c-ink) !important;
  color: #fff !important;
  font-weight: 500;
}

/* Time slots */
.time-card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  padding: var(--sp-5);
}

.time-grid {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-2);
  margin-top: var(--sp-3);
}

.time-chip {
  padding: 6px 14px;
  border-radius: var(--r-full);
  border: 1px solid var(--c-border);
  background: none;
  font-family: 'Inter', sans-serif;
  font-size: var(--t-xs);
  font-weight: 500;
  color: var(--c-muted);
  cursor: pointer;
  transition: all var(--dur-fast);
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.02em;
}
.time-chip:hover { border-color: var(--c-border-2); color: var(--c-ink); background: var(--c-hover); }
.time-chip.selected {
  background: var(--c-ink);
  border-color: var(--c-ink);
  color: #fff;
}

/* CTA */
.btn-cta {
  width: 100%;
  padding: 14px;
  border-radius: var(--r-md);
  border: none;
  font-family: 'Inter', sans-serif;
  font-size: var(--t-sm);
  font-weight: 600;
  letter-spacing: -0.01em;
  background: var(--c-border);
  color: var(--c-subtle);
  cursor: not-allowed;
  transition: all var(--dur-base) var(--ease-out);
  pointer-events: none;
}
.btn-cta.active {
  background: var(--c-ink);
  color: #fff;
  cursor: pointer;
  pointer-events: all;
  box-shadow: 0 1px 2px rgba(0,0,0,.2), 0 4px 16px rgba(0,0,0,.12);
}
.btn-cta.active:hover {
  background: #1c1c1a;
  transform: translateY(-1px);
  box-shadow: 0 2px 4px rgba(0,0,0,.2), 0 8px 24px rgba(0,0,0,.16);
}
.btn-cta.active:active { transform: scale(0.98); }

/* ═══════════════════════════════════════════
   SCREEN 3 — CONFIRMATION
═══════════════════════════════════════════ */
.s3-card {
  width: 100%; max-width: 400px;
  padding: var(--sp-10) var(--sp-8);
  text-align: center;
  position: relative; z-index: 2;
}

.s3-check {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--c-ink);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto var(--sp-6);
  animation: popIn 0.5s var(--ease-out) both;
}
.s3-check svg { width: 22px; height: 22px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

@keyframes popIn {
  0%  { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.1); }
  100%{ transform: scale(1); opacity: 1; }
}

.s3-title {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: clamp(var(--t-2xl), 5vw, var(--t-3xl));
  font-weight: 400;
  line-height: 1.2;
}

.s3-sub {
  font-size: var(--t-sm);
  color: var(--c-subtle);
  margin-top: var(--sp-2);
}

.s3-details {
  background: var(--c-bg);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  padding: var(--sp-5) var(--sp-6);
  margin-top: var(--sp-6);
  text-align: left;
  display: flex;
  flex-direction: column;
  gap: var(--sp-4);
}

.detail-row {
  display: flex;
  align-items: flex-start;
  gap: var(--sp-3);
}
.detail-icon {
  font-size: var(--t-base);
  line-height: 1.4;
  flex-shrink: 0;
}
.detail-body { display: flex; flex-direction: column; gap: 1px; }
.detail-key {
  font-size: var(--t-xs);
  color: var(--c-subtle);
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.detail-val {
  font-size: var(--t-sm);
  font-weight: 500;
  color: var(--c-ink);
}

.share-row {
  display: flex;
  gap: var(--sp-3);
  margin-top: var(--sp-6);
}
.share-row .btn { flex: 1; }

/* ═══════════════════════════════════════════
   MICRO-SPARKS
═══════════════════════════════════════════ */
.sparks-layer { position: fixed; inset: 0; pointer-events: none; z-index: 400; }
.spark {
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--c-ink);
  animation: sparkRise 0.9s var(--ease-out) forwards;
}
@keyframes sparkRise {
  0%   { opacity: 0.7; transform: scale(1) translateY(0); }
  100% { opacity: 0;   transform: scale(0.2) translateY(-72px); }
}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media (max-width: 480px) {
  .s1-card { padding: var(--sp-10) var(--sp-6); }
  .s3-card { padding: var(--sp-8) var(--sp-6); }
}
</style>
</head>
<body>

<!-- Canvases -->
<canvas id="canvas-confetti" aria-hidden="true"></canvas>
<canvas id="canvas-particles" aria-hidden="true"></canvas>
<div class="sparks-layer" id="sparks-layer" aria-hidden="true"></div>

<!-- ═══════════ SCREEN 1 ═══════════ -->
<section class="screen active" id="screen-1" role="main" aria-label="Приглашение">
  <div class="card s1-card">

    <p class="s1-line s1-label" id="s1-label">Личное приглашение</p>

    <h1 class="s1-line s1-name" id="s1-name">Индира</h1>

    <div class="s1-line s1-rule" id="s1-rule"></div>

    <p class="s1-line s1-question" id="s1-q">
      Вы согласитесь пойти<br>со мной на встречу?
    </p>

    <div class="s1-line s1-actions" id="s1-actions">
      <button class="btn btn-primary" id="btn-yes" onclick="onYes()">
        Да, конечно
      </button>
      <button class="btn btn-ghost btn-no" id="btn-no">
        Нет
      </button>
    </div>

    <p class="s1-fate" id="s1-fate" aria-live="polite"></p>

  </div>
</section>

<!-- ═══════════ SCREEN 2 ═══════════ -->
<section class="screen" id="screen-2" hidden aria-label="Выбор встречи">
  <div class="s2-inner">

    <header class="s2-header">
      <h2 class="s2-title">Я рад Вашему согласию</h2>
      <p class="s2-sub">Давайте выберем формат и время</p>
    </header>

    <!-- Format -->
    <div class="section-label">Формат</div>
    <div class="format-grid" id="format-grid" role="group" aria-label="Выберите формат встречи">
      <div class="format-card" role="button" tabindex="0" onclick="selectFormat(this,'Кофе')"        data-label="Кофе">        <span class="fc-icon">☕</span><span class="fc-label">Кофе</span></div>
      <div class="format-card" role="button" tabindex="0" onclick="selectFormat(this,'Кино')"         data-label="Кино">         <span class="fc-icon">🎬</span><span class="fc-label">Кино</span></div>
      <div class="format-card" role="button" tabindex="0" onclick="selectFormat(this,'Прогулка')"     data-label="Прогулка">     <span class="fc-icon">🌿</span><span class="fc-label">Прогулка</span></div>
      <div class="format-card" role="button" tabindex="0" onclick="selectFormat(this,'Сюрприз')"      data-label="Сюрприз">      <span class="fc-icon">✦</span> <span class="fc-label">Сюрприз</span></div>
      <div class="format-card format-custom" role="button" tabindex="0" id="card-custom" onclick="selectCustom(this)" style="grid-column: span 2; display:flex; align-items:center; justify-content:center; gap:8px; flex-direction:row; padding:14px 12px;">
        <span class="fc-icon" style="margin:0; font-size:1.1rem;">✏️</span>
        <span class="fc-label" style="font-size:0.75rem;">Свой вариант</span>
      </div>
    </div>

    <div class="custom-wrap" id="custom-wrap">
      <input
        class="custom-input"
        id="custom-input"
        type="text"
        placeholder="Напишите свой вариант…"
        oninput="onCustomInput()"
        autocomplete="off"
        maxlength="60"
      >
    </div>

    <!-- Calendar -->
    <div class="section-label">Дата</div>
    <div class="cal-card" role="region" aria-label="Выбор даты">
      <div class="cal-nav-row">
        <button class="cal-btn" onclick="shiftMonth(-1)" aria-label="Предыдущий месяц">‹</button>
        <span class="cal-month-label" id="cal-label"></span>
        <button class="cal-btn" onclick="shiftMonth(1)"  aria-label="Следующий месяц">›</button>
      </div>
      <div class="cal-grid" id="cal-grid" role="grid"></div>
    </div>

    <!-- Time -->
    <div class="section-label">Время</div>
    <div class="time-card">
      <div class="time-grid" id="time-grid" role="group" aria-label="Выберите время"></div>
    </div>

    <button class="btn-cta" id="btn-cta" onclick="onConfirm()" disabled>
      Подтвердить встречу
    </button>

  </div>
</section>

<!-- ═══════════ SCREEN 3 ═══════════ -->
<section class="screen" id="screen-3" hidden aria-label="Встреча подтверждена">
  <div class="card s3-card">

    <div class="s3-check" aria-hidden="true">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>

    <h2 class="s3-title">Встреча назначена</h2>
    <p class="s3-sub">До скорой встречи, Индира</p>

    <div class="s3-details">
      <div class="detail-row">
        <span class="detail-icon">📍</span>
        <div class="detail-body">
          <span class="detail-key">Формат</span>
          <span class="detail-val" id="r-format"></span>
        </div>
      </div>
      <div class="detail-row">
        <span class="detail-icon">📅</span>
        <div class="detail-body">
          <span class="detail-key">Дата</span>
          <span class="detail-val" id="r-date"></span>
        </div>
      </div>
      <div class="detail-row">
        <span class="detail-icon">🕐</span>
        <div class="detail-body">
          <span class="detail-key">Время</span>
          <span class="detail-val" id="r-time"></span>
        </div>
      </div>
    </div>

    <div class="share-row">
      <button class="btn btn-ghost" onclick="shareViaTg()">📱 Telegram</button>
      <button class="btn btn-ghost" onclick="shareViaWa()">💬 WhatsApp</button>
    </div>

  </div>
</section>

<script>
/* ═══════════════════════════════════════════
   AUDIO ENGINE
═══════════════════════════════════════════ */
let _audioCtx = null;

function getAudio() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}

function playTone(freq, gain, start, duration) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    osc.connect(env);
    env.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    const t = ctx.currentTime + start;
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(gain, t + 0.04);
    env.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.start(t);
    osc.stop(t + duration + 0.05);
  } catch(e) {}
}

function playChime() {
  [[523.25, 0.1, 0], [659.25, 0.09, 0.12], [783.99, 0.08, 0.24], [1046.5, 0.07, 0.38]]
    .forEach(([f, g, s]) => playTone(f, g, s, 0.4));
}

function playClick() { playTone(660, 0.06, 0, 0.15); }

/* ═══════════════════════════════════════════
   CANVAS SETUP
═══════════════════════════════════════════ */
const cfCanvas  = document.getElementById('canvas-confetti');
const ptCanvas  = document.getElementById('canvas-particles');
const cfCtx     = cfCanvas.getContext('2d');
const ptCtx     = ptCanvas.getContext('2d');

function resizeCanvases() {
  const w = window.innerWidth, h = window.innerHeight;
  [cfCanvas, ptCanvas].forEach(c => { c.width = w; c.height = h; });
}
window.addEventListener('resize', resizeCanvases, { passive: true });
resizeCanvases();

/* ── CONFETTI ── */
let _confetti = [], _cfRaf = null;

function launchConfetti() {
  cfCanvas.style.opacity = '1';
  const colors = ['#0f0f0e','#44403c','#78716c','#a8a29e','#e7e5e4','#ffffff','#d6d3d1'];
  for (let i = 0; i < 90; i++) {
    _confetti.push({
      x: Math.random() * cfCanvas.width,
      y: -10 - Math.random() * cfCanvas.height * 0.25,
      w: 5 + Math.random() * 7,
      h: 8 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      vx: (Math.random() - 0.5) * 2.5,
      vy: 1.6 + Math.random() * 2.8,
      vr: (Math.random() - 0.5) * 0.12,
      alpha: 1,
    });
  }
  if (!_cfRaf) _animConfetti();
}

function _animConfetti() {
  cfCtx.clearRect(0, 0, cfCanvas.width, cfCanvas.height);
  let alive = false;
  _confetti.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.rot += p.vr;
    if (p.y > cfCanvas.height * 0.6) p.alpha -= 0.02;
    if (p.alpha > 0) alive = true;
    cfCtx.save();
    cfCtx.globalAlpha = Math.max(0, p.alpha);
    cfCtx.translate(p.x, p.y); cfCtx.rotate(p.rot);
    cfCtx.fillStyle = p.color;
    cfCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    cfCtx.restore();
  });
  if (alive) { _cfRaf = requestAnimationFrame(_animConfetti); }
  else { cfCanvas.style.opacity = '0'; _confetti = []; _cfRaf = null; }
}

/* ── PARTICLES (screen 3) ── */
let _particles = [], _ptRunning = false;

function startParticles() {
  ptCanvas.style.opacity = '1';
  _ptRunning = true;
  for (let i = 0; i < 60; i++) _particles.push(_mkParticle(true));
  _animParticles();
}

function _mkParticle(scatter) {
  return {
    x: Math.random() * ptCanvas.width,
    y: scatter ? Math.random() * ptCanvas.height : ptCanvas.height + 5,
    r: 0.8 + Math.random() * 1.8,
    speed: 0.15 + Math.random() * 0.35,
    alpha: 0.06 + Math.random() * 0.2,
  };
}

function _animParticles() {
  if (!_ptRunning) return;
  ptCtx.clearRect(0, 0, ptCanvas.width, ptCanvas.height);
  _particles.forEach(p => {
    p.y -= p.speed;
    if (p.y < -5) Object.assign(p, _mkParticle(false));
    ptCtx.save();
    ptCtx.globalAlpha = p.alpha;
    ptCtx.fillStyle = '#78716c';
    ptCtx.beginPath();
    ptCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ptCtx.fill();
    ptCtx.restore();
  });
  requestAnimationFrame(_animParticles);
}

/* ── SPARKS ── */
function spawnSparks(n) {
  const layer = document.getElementById('sparks-layer');
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'spark';
      el.style.left = (10 + Math.random() * 80) + 'vw';
      el.style.top  = (15 + Math.random() * 65) + 'vh';
      el.style.animationDelay = (Math.random() * 0.2) + 's';
      layer.appendChild(el);
      setTimeout(() => el.remove(), 1100);
    }, i * 30);
  }
}

/* ═══════════════════════════════════════════
   SCREEN 1 — ENTRANCE ANIMATION
═══════════════════════════════════════════ */
const S1_DELAYS = [
  ['s1-label',   200],
  ['s1-name',    550],
  ['s1-rule',   1050],
  ['s1-q',      1200],
  ['s1-actions',1700],
];

S1_DELAYS.forEach(([id, delay]) => {
  setTimeout(() => document.getElementById(id)?.classList.add('visible'), delay);
});

/* ═══════════════════════════════════════════
   NO BUTTON LOGIC
═══════════════════════════════════════════ */
const NO_TEXTS = [
  'Нет',
  'Подождите…',
  'Точно нет?',
  'Подумайте ещё',
  'Может всё-таки?',
  'Ну пожалуйста',
  'Последний шанс',
  'Нажмите «Да»',
];

let _noIdx   = 0;
let _noScale = 1;
let _yesScale = 1;
let _noBusy  = false; // debounce flag

const btnNo  = document.getElementById('btn-no');
const btnYes = document.getElementById('btn-yes');

function runNoEscape() {
  if (_noBusy) return;
  _noBusy = true;
  setTimeout(() => { _noBusy = false; }, 350);

  getAudio(); // init audio context on first interaction

  if (_noIdx >= NO_TEXTS.length - 1) {
    // Final state — disappear
    btnNo.style.opacity = '0';
    btnNo.style.pointerEvents = 'none';
    const fate = document.getElementById('s1-fate');
    fate.textContent = 'Кажется, это уже решено само собой.';
    fate.classList.add('visible');
    return;
  }

  btnNo.textContent = NO_TEXTS[_noIdx++];

  // Scale adjustments
  _noScale  = Math.max(0.55, _noScale  - 0.05);
  _yesScale = Math.min(1.40, _yesScale + 0.07);
  btnYes.style.transform = `scale(${_yesScale})`;

  // Make fixed if not already
  if (!btnNo.classList.contains('is-fixed')) {
    const r = btnNo.getBoundingClientRect();
    btnNo.style.left   = r.left + 'px';
    btnNo.style.top    = r.top  + 'px';
    btnNo.style.width  = r.width + 'px';
    btnNo.classList.add('is-fixed');
  }

  // Compute safe random target within viewport
  const margin = 20;
  const bw = (btnNo.offsetWidth  || 100) * _noScale;
  const bh = (btnNo.offsetHeight || 40)  * _noScale;
  const maxX = window.innerWidth  - bw - margin;
  const maxY = window.innerHeight - bh - margin;
  const tx = margin + Math.random() * Math.max(0, maxX - margin);
  const ty = margin + Math.random() * Math.max(0, maxY - margin);

  btnNo.style.transform = `scale(${_noScale})`;
  btnNo.style.left = tx + 'px';
  btnNo.style.top  = ty + 'px';
}

// Desktop
btnNo.addEventListener('mouseenter', runNoEscape);
// Mobile
btnNo.addEventListener('touchstart', (e) => {
  e.preventDefault();
  runNoEscape();
}, { passive: false });

/* ═══════════════════════════════════════════
   YES BUTTON
═══════════════════════════════════════════ */
function onYes() {
  playChime();
  spawnSparks(5);
  launchConfetti();
  setTimeout(() => {
    switchScreen('screen-1', 'screen-2');
    buildCalendar();
    buildTimeSlots();
  }, 800);
}

/* ═══════════════════════════════════════════
   SCREEN TRANSITION
═══════════════════════════════════════════ */
function switchScreen(fromId, toId) {
  const from = document.getElementById(fromId);
  const to   = document.getElementById(toId);
  from.classList.remove('active');
  from.setAttribute('hidden', '');
  to.removeAttribute('hidden');
  // Force reflow before adding active
  to.getBoundingClientRect();
  to.classList.add('active');
  to.scrollTop = 0;
}

/* ═══════════════════════════════════════════
   FORMAT SELECTION
═══════════════════════════════════════════ */
let _selectedFormat = null;

function selectFormat(el, label) {
  playClick();
  document.querySelectorAll('.format-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  _selectedFormat = label;
  document.getElementById('custom-wrap').classList.remove('visible');
  document.getElementById('custom-input').value = '';
  spawnSparks(2);
  checkCTA();
}

function selectCustom(el) {
  playClick();
  document.querySelectorAll('.format-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  _selectedFormat = null;
  const wrap = document.getElementById('custom-wrap');
  wrap.classList.add('visible');
  setTimeout(() => document.getElementById('custom-input').focus(), 80);
  checkCTA();
}

function onCustomInput() {
  _selectedFormat = document.getElementById('custom-input').value.trim() || null;
  checkCTA();
}

/* ═══════════════════════════════════════════
   CALENDAR
═══════════════════════════════════════════ */
const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                   'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DAYS_SHORT = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

let _calYear, _calMonth, _selectedDay = null;

(function initCal() {
  const n = new Date();
  _calYear  = n.getFullYear();
  _calMonth = n.getMonth();
})();

function buildCalendar() {
  document.getElementById('cal-label').textContent =
    MONTHS_RU[_calMonth] + ' ' + _calYear;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Day headers
  DAYS_SHORT.forEach(d => {
    const el = document.createElement('span');
    el.className = 'cal-dh';
    el.textContent = d;
    grid.appendChild(el);
  });

  // Empty cells
  const now = new Date(); now.setHours(0,0,0,0);
  let dow = new Date(_calYear, _calMonth, 1).getDay();
  dow = dow === 0 ? 6 : dow - 1;
  for (let i = 0; i < dow; i++) {
    const el = document.createElement('button');
    el.className = 'cal-day empty'; el.disabled = true;
    grid.appendChild(el);
  }

  // Day cells
  const daysInMonth = new Date(_calYear, _calMonth + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const btn = document.createElement('button');
    btn.className = 'cal-day';
    btn.textContent = d;
    btn.setAttribute('aria-label', `${d} ${MONTHS_RU[_calMonth]}`);
    const dt = new Date(_calYear, _calMonth, d);
    if (dt < now) {
      btn.classList.add('past');
      btn.disabled = true;
    } else {
      if (dt.getTime() === now.getTime()) btn.classList.add('today');
      btn.addEventListener('click', () => onDayClick(btn, d));
    }
    if (_selectedDay?.y === _calYear && _selectedDay?.m === _calMonth && _selectedDay?.d === d) {
      btn.classList.add('selected');
    }
    grid.appendChild(btn);
  }
}

function onDayClick(btn, d) {
  playClick();
  document.querySelectorAll('#cal-grid .cal-day').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  _selectedDay = { d, m: _calMonth, y: _calYear };
  checkCTA();
}

function shiftMonth(dir) {
  _calMonth += dir;
  if (_calMonth > 11) { _calMonth = 0; _calYear++; }
  if (_calMonth < 0)  { _calMonth = 11; _calYear--; }
  const n = new Date();
  if (_calYear < n.getFullYear() || (_calYear === n.getFullYear() && _calMonth < n.getMonth())) {
    _calMonth -= dir;
    if (_calMonth > 11) { _calMonth = 0; _calYear++; }
    if (_calMonth < 0)  { _calMonth = 11; _calYear--; }
    return;
  }
  buildCalendar();
}

/* ═══════════════════════════════════════════
   TIME SLOTS
═══════════════════════════════════════════ */
let _selectedTime = null;

function buildTimeSlots() {
  const grid = document.getElementById('time-grid');
  grid.innerHTML = '';
  for (let h = 10; h <= 22; h++) {
    ['00', '30'].forEach(m => {
      if (h === 22 && m === '30') return;
      const btn = document.createElement('button');
      btn.className = 'time-chip';
      btn.textContent = `${h}:${m}`;
      btn.setAttribute('aria-label', `${h}:${m}`);
      btn.addEventListener('click', () => {
        playClick();
        document.querySelectorAll('.time-chip').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        _selectedTime = `${h}:${m}`;
        checkCTA();
      });
      grid.appendChild(btn);
    });
  }
}

/* ═══════════════════════════════════════════
   CTA STATE
═══════════════════════════════════════════ */
function checkCTA() {
  const btn = document.getElementById('btn-cta');
  const ready = _selectedFormat && _selectedDay && _selectedTime;
  btn.classList.toggle('active', !!ready);
  btn.disabled = !ready;
  btn.setAttribute('aria-disabled', !ready);
}

/* ═══════════════════════════════════════════
   CONFIRM
═══════════════════════════════════════════ */
const MO_RU = ['января','февраля','марта','апреля','мая','июня',
               'июля','августа','сентября','октября','ноября','декабря'];

function onConfirm() {
  if (!_selectedFormat || !_selectedDay || !_selectedTime) return;
  playChime(); spawnSparks(8); launchConfetti();

  const dateStr = `${_selectedDay.d} ${MO_RU[_selectedDay.m]} ${_selectedDay.y}`;
  document.getElementById('r-format').textContent = _selectedFormat;
  document.getElementById('r-date').textContent   = dateStr;
  document.getElementById('r-time').textContent   = _selectedTime;

  setTimeout(() => {
    switchScreen('screen-2', 'screen-3');
    startParticles();
  }, 650);
}

/* ═══════════════════════════════════════════
   SHARE
═══════════════════════════════════════════ */

function shareViaTg() {
  const f = document.getElementById('r-format').textContent;
  const d = document.getElementById('r-date').textContent;
  const t = document.getElementById('r-time').textContent;
  const text = encodeURIComponent(`Я согласна встретится!\n\nФормат: ${f}\nДата: ${d}\nВремя: ${t}`);
  window.open(`https://t.me/alamovs?text=${text}`, '_blank');
}

function shareViaWa() {
  const f = document.getElementById('r-format').textContent;
  const d = document.getElementById('r-date').textContent;
  const t = document.getElementById('r-time').textContent;
  const text = encodeURIComponent(`Я согласна встретится!\n\nФормат: ${f}\nДата: ${d}\nВремя: ${t}`);
  window.open(`https://wa.me/998946666909?text=${text}`, '_blank');
}

/* ═══════════════════════════════════════════
   KEYBOARD ACCESSIBILITY
═══════════════════════════════════════════ */
document.querySelectorAll('.format-card').forEach(card => {
  card.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); }
  });
});

/* Init audio on first user gesture */
document.addEventListener('click', () => { try { getAudio(); } catch(e) {} }, { once: true });
</script>
